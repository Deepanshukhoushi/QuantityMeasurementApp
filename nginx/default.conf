server {
    listen 80;
    server_name 56.228.52.104; # Replace with your domain if available

    # Angular SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger Documentation
    location ^~ /swagger-ui/ {
        proxy_pass http://api-gateway:8080/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /swagger-ui.html {
        proxy_pass http://api-gateway:8080/swagger-ui.html;
        proxy_set_header Host $host;
    }

    location ^~ /v3/api-docs {
        proxy_pass http://api-gateway:8080/v3/api-docs;
        proxy_set_header Host $host;
    }


    # OAuth2 Redirects
    location /oauth2/ {
        proxy_pass http://api-gateway:8080/oauth2/;
        proxy_set_header Host $host;
    }
}
