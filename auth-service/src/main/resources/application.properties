# ==============================
# Auth Service Configuration
# ==============================

# Spring Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server Configuration
server.port=${SERVER_PORT:8083}
server.forward-headers-strategy=FRAMEWORK
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Application Name
spring.application.name=auth-service

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/quantitymeasurement_auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Deepanshu}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT Configuration
app.auth.token-secret=${APP_AUTH_TOKEN_SECRET:DefaultSecretKeyThatIsAtLeast32BytesLongForSecurity123!}
app.auth.token-expiration-msec=${APP_AUTH_TOKEN_EXPIRATION_MSEC:864000000}
app.auth.refresh-token-expiration-msec=${APP_AUTH_REFRESH_TOKEN_EXPIRATION_MSEC:2592000000}

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${APP_OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.scope=profile,email
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI:http://localhost:4200/login}

# Email / SMTP Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Password Reset URL (Frontend)
app.auth.reset-password-url=${APP_RESET_PASSWORD_URL:http://localhost:4200/reset-password}

# Logging
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.security=DEBUG

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.health.mail.enabled=false
management.info.env.enabled=true

# Spring Boot Admin Client
spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.instance.prefer-ip=true
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123
