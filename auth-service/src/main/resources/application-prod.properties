# ==============================
# Auth Service Production Configuration
# ==============================

# OAuth2 Redirect URI (Production)
# Mandatory environment variable: APP_OAUTH2_REDIRECT_URI
app.oauth2.redirectUri=${APP_OAUTH2_REDIRECT_URI}

# CORS Allowed Origins (Production)
# Mandatory environment variable: APP_CORS_ALLOWED_ORIGINS
app.cors.allowedOrigins=${APP_CORS_ALLOWED_ORIGINS}

# Database URL (Production)
# Mandatory environment variable: DB_URL
spring.datasource.url=${DB_URL}

# Eureka (Production)
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL}
