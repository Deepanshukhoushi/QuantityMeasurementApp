# API Gateway Configuration
spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}
spring.cloud.gateway.x-forwarded.enabled=true
server.forward-headers-strategy=FRAMEWORK

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.healthcheck.enabled=true
eureka.client.registry-fetch-interval-seconds=10
eureka.client.initial-instance-info-replication-interval-seconds=10
eureka.client.eureka-server-connect-timeout-seconds=5
eureka.client.eureka-server-read-timeout-seconds=8
eureka.instance.prefer-ip-address=true
spring.cloud.loadbalancer.retry.enabled=true

# ── Global CORS Configuration (single frontend origin) ──
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

# ── Route 1: Auth endpoints → auth-service ──
spring.cloud.gateway.routes[0].id=auth-route
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**


# ── Route 2: Quantity measurement endpoints → measurement-service ──
spring.cloud.gateway.routes[1].id=measurement-route
spring.cloud.gateway.routes[1].uri=lb://measurement-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/quantities/**

# ── Route 3: User profile endpoints → auth-service ──
spring.cloud.gateway.routes[2].id=user-profile-route
spring.cloud.gateway.routes[2].uri=lb://auth-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/user/me


# ── Route 4: Conversion history → user-service ──
spring.cloud.gateway.routes[3].id=user-history-route
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**

# ── Route 5: Simple convert endpoint → measurement-service ──
spring.cloud.gateway.routes[4].id=convert-route
spring.cloud.gateway.routes[4].uri=lb://measurement-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/convert/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/convert/(?<segment>.*), /api/user/quantities/convert/$\\{segment}

# ── Route 6: Swagger UI HTML → API Gateway itself ──
spring.cloud.gateway.routes[5].id=swagger-ui-html-route
spring.cloud.gateway.routes[5].uri=http://localhost:8080
spring.cloud.gateway.routes[5].predicates[0]=Path=/swagger-ui.html

# ── Route 7: Swagger UI Resources → API Gateway itself ──
spring.cloud.gateway.routes[6].id=swagger-ui-resources-route
spring.cloud.gateway.routes[6].uri=http://localhost:8080
spring.cloud.gateway.routes[6].predicates[0]=Path=/swagger-ui/**

# ── Route 8: API Docs → API Gateway itself ──
spring.cloud.gateway.routes[7].id=api-docs-route
spring.cloud.gateway.routes[7].uri=http://localhost:8080
spring.cloud.gateway.routes[7].predicates[0]=Path=/v3/api-docs/**

# ── Route 9: OAuth2 endpoints → auth-service ──
spring.cloud.gateway.routes[8].id=oauth2-route
spring.cloud.gateway.routes[8].uri=lb://auth-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/oauth2/**,/login/oauth2/**


# ── Route 10: History alias endpoint → measurement-service (rewrite to quantities history) ──
spring.cloud.gateway.routes[9].id=history-alias-route
spring.cloud.gateway.routes[9].uri=lb://measurement-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/user/history/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/api/user/history/(?<segment>.*), /api/user/quantities/history/$\\{segment}

# Actuator
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Spring Boot Admin Client
spring.boot.admin.client.url=http://localhost:9090
spring.boot.admin.client.instance.prefer-ip=true
spring.boot.admin.client.username=admin
spring.boot.admin.client.password=admin123

# Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.show-actuator=true

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.quantitymeasurement.api_gateway=DEBUG
