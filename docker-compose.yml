services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: qm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Deepanshu}
      MYSQL_DATABASE: ${DB_DATABASE:-quantitymeasurement_db}
      MYSQL_USER: ${DB_USERNAME:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-Deepanshu}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qm-network

  # Cache
  redis:
    image: redis:6.2-alpine
    container_name: qm-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qm-network

  # Service Discovery
  eureka-server:
    build:
      context: ./eureka-server
    container_name: qm-eureka-server
    restart: always
    ports:
      - "8761:8761"
    # Port 8761 is internal only
    networks:
      - qm-network

  # Admin Monitoring
  admin-server:
    build:
      context: ./admin-server
    container_name: qm-admin-server
    restart: always
    depends_on:
      eureka-server:
        condition: service_started
    ports:
      - "9090:9090"
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SERVER_ADDRESS: 0.0.0.0
    # Port 9090 is internal only
    networks:
      - qm-network

  # Microservices
  auth-service:
    build:
      context: ./auth-service
    container_name: qm-auth-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_auth_db?createDatabaseIfNotExist=true&useSSL=false
      SERVER_ADDRESS: 0.0.0.0
    networks:
      - qm-network

  user-service:
    build:
      context: ./user-service
    container_name: qm-user-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_user_db?createDatabaseIfNotExist=true&useSSL=false
      SERVER_ADDRESS: 0.0.0.0
    networks:
      - qm-network

  measurement-service:
    build:
      context: ./measurement-service
    container_name: qm-measurement-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_db?useSSL=false
      SPRING_REDIS_HOST: redis
      SERVER_ADDRESS: 0.0.0.0
    networks:
      - qm-network

  # Entry Point for Backend
  api-gateway:
    build:
      context: ./api-gateway
    container_name: qm-api-gateway
    restart: always
    depends_on:
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SERVER_ADDRESS: 0.0.0.0
    networks:
      - qm-network

  # Entry Point for System (Proxy + Frontend)
  nginx-proxy:
    build:
      context: ..
      dockerfile: ./QuantityMeasurementApp/nginx/Dockerfile
    container_name: qm-nginx-proxy
    restart: always
    depends_on:
      - api-gateway
    ports:
      - "80:80"
    networks:
      - qm-network

networks:
  qm-network:
    driver: bridge

volumes:
  mysql-data: