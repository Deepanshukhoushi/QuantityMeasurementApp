services:
  mysql:
    image: mysql:8.0
    container_name: qm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Deepanshu}
      MYSQL_DATABASE: quantitymeasurement_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./data/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    networks:
      - qm-network

  redis:
    image: redis:6.2-alpine
    container_name: qm-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qm-network

  eureka-server:
    build:
      context: ./eureka-server
    container_name: qm-eureka-server
    restart: always
    ports:
      - "8761:8761"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qm-network

  admin-server:
    build:
      context: ./admin-server
    container_name: qm-admin-server
    restart: always
    depends_on:
      eureka-server:
        condition: service_started
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qm-network

  auth-service:
    build:
      context: ./auth-service
    container_name: qm-auth-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_auth_db?createDatabaseIfNotExist=true&useSSL=false
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8083:8083"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qm-network

  user-service:
    build:
      context: ./user-service
    container_name: qm-user-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_user_db?createDatabaseIfNotExist=true&useSSL=false
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qm-network

  measurement-service:
    build:
      context: ./measurement-service
    container_name: qm-measurement-service
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quantitymeasurement_db?useSSL=false
      SPRING_REDIS_HOST: redis
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - qm-network

  api-gateway:
    build:
      context: ./api-gateway
    container_name: qm-api-gateway
    restart: always
    depends_on:
      eureka-server:
        condition: service_started
    env_file:
      - .env
    environment:
      EUREKA_SERVER_URL: http://eureka-server:8761/eureka/
      SPRING_BOOT_ADMIN_CLIENT_URL: http://admin-server:9090
      SERVER_ADDRESS: 0.0.0.0
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - qm-network

networks:
  qm-network:
    driver: bridge

volumes:
  mysql-data: