# Repository type: choose "cache" for memory or "database" for persistent storage

repository.type=database

# Application environment

app.env=development

# H2 Database configuration

db.url=jdbc:h2:./quantitymeasurementdb;AUTO_SERVER=TRUE
db.username=sa
db.password=
db.driver=org.h2.Driver

# HikariCP connection pool settings

db.hikari.maximum-pool-size=10
db.hikari.minimum-idle=2
db.hikari.connection-timeout=30000
db.hikari.idle-timeout=600000
db.hikari.max-lifetime=1800000
db.hikari.pool-name=QuantityMeasurementPool
db.hikari.connection-test-query=SELECT 1

# Logging configuration (kept minimal for clean console output)

logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.h2=ERROR
logging.pattern.console=%msg%n
